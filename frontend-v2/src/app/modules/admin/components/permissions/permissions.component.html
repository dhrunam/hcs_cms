<div class="admin-page">
  <h1 class="admin-page__title">Permissions</h1>
  <p class="admin-page__subtitle">Django model permissions.</p>

  <mat-form-field appearance="outline" class="admin-page__search">
    <mat-label>Search</mat-label>
    <input
      matInput
      type="search"
      [(ngModel)]="search"
      (ngModelChange)="onSearchInput($event)"
      placeholder="Permission name or codename"
      autocomplete="off"
    />
  </mat-form-field>

  @if (errorMsg()) {
    <div class="admin-page__error" role="alert">{{ errorMsg() }}</div>
  }

  <div class="admin-table-card mat-elevation-z2">
    @if (loading()) {
      <div class="admin-page__loading">
        <mat-progress-spinner diameter="40" mode="indeterminate" />
        <span>Loading…</span>
      </div>
    } @else if (rows().length === 0) {
      <div class="admin-page__empty">No Data Found</div>
    } @else {
      <div class="admin-table-wrap">
        <table mat-table [dataSource]="rows()" class="admin-mat-table">
          <ng-container matColumnDef="index">
            <th mat-header-cell *matHeaderCellDef>#</th>
            <td mat-cell *matCellDef="let row; let i = index">{{ serialForRow(i) }}</td>
          </ng-container>

          <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef>Permission name</th>
            <td mat-cell *matCellDef="let row">{{ row.name }}</td>
          </ng-container>

          <ng-container matColumnDef="description">
            <th mat-header-cell *matHeaderCellDef>Description</th>
            <td mat-cell *matCellDef="let row">
              <span class="perm-codename">{{ row.codename }}</span>
              <span class="perm-desc">{{ row.description }}</span>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="columnKeys"></tr>
          <tr mat-row *matRowDef="let row; columns: columnKeys" class="admin-mat-row"></tr>
        </table>
      </div>

      <mat-paginator
        [length]="totalCount()"
        [pageSize]="pageSize()"
        [pageIndex]="page() - 1"
        [pageSizeOptions]="[10, 15, 25, 50]"
        [showFirstLastButtons]="true"
        (page)="onMatPage($event)"
      />
    }
  </div>
</div>
