<div class="pdf-annotator-container">
  <div *ngIf="isLoading" class="loading-overlay">
    Loading Document... {{ loadingProgress }}%
  </div>
  
  <div class="annotator-page-indicator" *ngIf="!isLoading && pages.length > 0">
    <span class="page-indicator-text"
      >Page {{ currentPageIndex + 1 }} of {{ pages.length }}</span
    >
  </div>

  <div class="annotator-toolbar" *ngIf="canWrite">
    <div class="btn-group btn-group-sm me-3">
      <button class="btn btn-outline-secondary" [class.active-tool]="currentTool === 'pen' && penColor === '#000000'" (click)="setTool('pen', '#000000')">
        <i class="fa fa-pen" style="color: black;"></i> Black
      </button>
      <button class="btn btn-outline-secondary" [class.active-tool]="currentTool === 'pen' && penColor === '#0000FF'" (click)="setTool('pen', '#0000FF')">
        <i class="fa fa-pen" style="color: blue;"></i> Blue
      </button>
      <button class="btn btn-outline-secondary" [class.active-tool]="currentTool === 'pen' && penColor === '#FF0000'" (click)="setTool('pen', '#FF0000')">
        <i class="fa fa-pen" style="color: red;"></i> Red
      </button>
      <button class="btn btn-outline-secondary" [class.active-tool]="currentTool === 'pen' && penColor === '#008000'" (click)="setTool('pen', '#008000')">
        <i class="fa fa-pen" style="color: green;"></i> Green
      </button>
    </div>

    <div class="btn-group btn-group-sm me-3">
      <button class="btn btn-outline-warning" [class.active-tool]="currentTool === 'highlighter'" (click)="setTool('highlighter')">
        <i class="fa fa-highlighter"></i> Highlight
      </button>
    </div>
    
    <div class="btn-group btn-group-sm me-3">
      <button class="btn btn-outline-primary" [class.active-tool]="currentTool === 'note'" (click)="setTool('note')">
        <i class="fa fa-sticky-note"></i> Add Note
      </button>
    </div>
    
    <div class="btn-group btn-group-sm me-3">
      <button class="btn btn-outline-dark" (click)="undoLastAction()" [disabled]="undoStack.length === 0">
        <i class="fa fa-undo"></i> Undo
      </button>
    </div>
    
    <div class="btn-group btn-group-sm ms-auto">
      <button class="btn btn-outline-danger" (click)="clearCurrentPage()">
        <i class="fa fa-eraser"></i> Clear Page
      </button>
      <button class="btn btn-success ms-2" (click)="saveAnnotations()" [disabled]="!canWrite">
        <i class="fa fa-save"></i> Save Annotations
      </button>
    </div>
  </div>

  <div class="pdf-scroll-area" #scrollContainer (scroll)="onScroll($event)">
    <div *ngFor="let page of pages; let i = index" class="pdf-page-container" [style.width.px]="page.width" [style.height.px]="page.height">
      <!-- PDF Canvas -->
      <canvas class="pdf-canvas" [id]="'pdf-canvas-' + i" [width]="page.width" [height]="page.height" #pdfCanvas></canvas>
      
      <!-- Drawing Canvas -->
      <canvas class="draw-canvas" [id]="'draw-canvas-' + i" [width]="page.width" [height]="page.height" #drawCanvas
        (mousedown)="onMouseDown($event, i)"
        (mousemove)="onMouseMove($event, i)"
        (mouseup)="onMouseUp()"
        (mouseleave)="onMouseUp()">
      </canvas>

      <!-- Notes Overlay -->
      <div class="notes-container">
        <div class="note-box" *ngFor="let note of getNotesForPage(i); let noteIndex = index"
             [style.left.px]="note.x * page.width"
             [style.top.px]="note.y * page.height"
             cdkDrag 
             [cdkDragBoundary]="'.pdf-page-container'"
             (cdkDragEnded)="onNoteDropped($event, i, noteIndex)">
          <div class="note-header d-flex justify-content-between align-items-center" cdkDragHandle>
            <span class="text-truncate">Note</span>
            <button (click)="removeNote(i, noteIndex)"><i class="fa fa-times"></i></button>
          </div>
          <textarea class="note-textarea" [(ngModel)]="note.text" (input)="triggerChange()"></textarea>
        </div>
      </div>
    </div>
  </div>
</div>
