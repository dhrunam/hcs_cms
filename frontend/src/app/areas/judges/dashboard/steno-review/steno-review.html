<div class="d-flex justify-content-between align-items-center mb-3">
  <h3 class="mb-0">Steno Draft Review</h3>
</div>

<div *ngIf="isLoading" class="text-muted">Loading...</div>
<div *ngIf="!isLoading">
  <div class="card mb-3" *ngFor="let item of items">
    <div class="card-body">
      <div class="fw-bold">{{ item.case_number || '-' }}</div>
      <div class="small text-muted mb-2">{{ item.document_type }} | Draft Doc ID: {{ item.draft_document_index_id || '-' }}</div>
      <div class="small mb-2">{{ item.proceedings_text }}</div>

      <div class="mb-2">
        <label class="form-label small">Annotation Note</label>
        <input class="form-control" [(ngModel)]="annotationText[item.workflow_id]" />
        <button class="btn btn-outline-secondary btn-sm mt-2" (click)="addAnnotation(item)">Add Note</button>
      </div>

      <div class="mb-2">
        <label class="form-label small">Decision Notes</label>
        <textarea class="form-control" rows="2" [(ngModel)]="notes[item.workflow_id]"></textarea>
      </div>

      <div class="d-flex gap-2">
        <button class="btn btn-success btn-sm" (click)="decide(item, 'APPROVED')">Approve</button>
        <button class="btn btn-warning btn-sm" (click)="decide(item, 'REJECTED')">Request Changes</button>
      </div>
    </div>
  </div>
</div>
