<div class="login-page">
  <div class="login-card">
    <div class="logo-wrap">
      <img src="/assets/icons/hcs_logo.jpeg" alt="High Court" />
    </div>

    <h1 class="title">Sikkim eFiling Module</h1>
    <p class="subtitle text-muted">Sign in using the High Court SSO service.</p>

    <div *ngIf="authErrorMessage" class="alert alert-danger mt-4" role="alert">
      {{ authErrorMessage }}
    </div>

    <div class="actions text-center mt-5">
      <button
        class="btn login-button"
        style="color: white; background: rgb(37, 37, 129)"
        type="button"
        [disabled]="isLoading"
        (click)="submit()"
      >
        <span *ngIf="!isLoading">Continue with SSO</span>
        <span *ngIf="isLoading" class="loading">Redirecting...</span>
      </button>
    </div>

    <div class="hint hint-warning" role="status" aria-live="polite">
      <div class="hint-item">
        Authentication is handled only by the SSO server at localhost:8000.
      </div>
      <div class="hint-item">
        No local fallback credentials are available in this UI.
      </div>
    </div>
  </div>
</div>
