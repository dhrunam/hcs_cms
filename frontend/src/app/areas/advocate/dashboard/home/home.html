<div
  class="dashboard-header mb-3 d-flex justify-content-between align-items-center flex-wrap gap-2"
>
  <div>
    <h5 class="mb-1 fw-semibold text-dark">Hi, Advocate</h5>
    <p class="text-muted small mb-0">Manage your advocate filings easily</p>
  </div>

  <button
    class="btn btn-sm px-3 py-2 d-flex align-items-center gap-2"
    style="background: #111827; color: #fff; border-radius: 8px"
    routerLink="/advocate/dashboard/efiling/new-filing"
  >
    <i class="fa-solid fa-plus" style="font-size: 12px"></i>
    <span class="small">New Filing</span>
  </button>
</div>

<section class="advocate-dashboard-section">
  <!-- SUMMARY CARDS -->
  <div class="row g-3">
    <div class="col-md-3">
      <div class="card border-0 shadow-sm h-100" style="border-radius: 12px">
        <div class="card-body py-3 px-3">
          <i class="fa-regular fa-folder-open text-primary mb-2"></i>
          <div class="text-muted small">Total Filings</div>
          <h5 class="mb-0 fw-semibold">{{ isLoading ? '-' : totalFilings }}</h5>
        </div>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card border-0 shadow-sm h-100" style="border-radius: 12px">
        <div class="card-body py-3 px-3">
          <i class="fa-regular fa-clock text-warning mb-2"></i>
          <div class="text-muted small">Pending</div>
          <h5 class="mb-0 fw-semibold">{{ isLoading ? '-' : pendingFilings }}</h5>
        </div>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card border-0 shadow-sm h-100" style="border-radius: 12px">
        <div class="card-body py-3 px-3">
          <i class="fa-regular fa-circle-check text-success mb-2"></i>
          <div class="text-muted small">Approved</div>
          <h5 class="mb-0 fw-semibold">{{ isLoading ? '-' : approvedFilings }}</h5>
        </div>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card border-0 shadow-sm h-100" style="border-radius: 12px">
        <div class="card-body py-3 px-3">
          <i class="fa-regular fa-circle-xmark text-danger mb-2"></i>
          <div class="text-muted small">Objections</div>
          <h5 class="mb-0 fw-semibold">{{ isLoading ? '-' : objections }}</h5>
        </div>
      </div>
    </div>
  </div>
</section>
