<div class="dashboard-header mb-3 d-flex justify-content-between align-items-center flex-wrap gap-2">
  <div>
    <h5 class="mb-1 fw-semibold text-dark">Cause List</h5>
    <p class="text-muted small mb-0">Find if your case appears in the published cause list</p>
  </div>
</div>

<div class="card border-0 shadow-sm p-3" style="border-radius: 12px">
  <div class="row g-3 align-items-end">
    <div class="col-md-3">
      <label class="form-label mb-1 fw-semibold">Cause List Date</label>
      <input
        type="date"
        class="form-control form-control-sm"
        [(ngModel)]="selectedDate"
        [ngModelOptions]="{ standalone: true }"
      />
    </div>
    <div class="col-md-6">
      <label class="form-label mb-1 fw-semibold">Case Number</label>
      <input
        type="text"
        class="form-control form-control-sm"
        [(ngModel)]="caseNumber"
        placeholder="Enter case number (e.g., CASE-...)"
        [ngModelOptions]="{ standalone: true }"
      />
    </div>
    <div class="col-md-3 d-grid">
      <button class="btn btn-dark btn-sm mt-0" (click)="search()" [disabled]="isSearching">
        <span *ngIf="!isSearching">Search</span>
        <span *ngIf="isSearching">Searching...</span>
      </button>
    </div>
  </div>

  <div *ngIf="errorMessage" class="alert alert-warning mt-3 mb-0 p-2">
    {{ errorMessage }}
  </div>

  <div *ngIf="result && result.found" class="mt-3">
    <div class="alert alert-success mt-0 p-2">
      Case found in cause list.
    </div>
    <div class="p-2">
      <div class="mb-1">
        <span class="fw-semibold">Bench:</span> {{ result.bench_key }}
      </div>
      <div class="mb-3">
        <span class="fw-semibold">Serial No:</span> {{ result.serial_no }}
      </div>

      <a
        *ngIf="result.pdf_url"
        [href]="result.pdf_url"
        target="_blank"
        class="btn btn-sm btn-outline-dark"
      >
        View Published Cause List PDF
      </a>
    </div>
  </div>

  <div *ngIf="result && !result.found" class="mt-3">
    <div class="alert alert-secondary mt-0 p-2">No published cause list entry found for this case on the selected date.</div>
  </div>
</div>
