<table class="table table-hover align-middle mb-0">
    <thead class="table-light">
      <tr>
        <th scope="col">Case Title</th>
        <th scope="col">Filing Type</th>
        <th scope="col">Last Updated</th>
        <th scope="col" class="text-end">Actions</th>
      </tr>
    </thead>
    <tbody>
      @for (draft of drafts; track draft.id) {
        <tr>
          <td class="fw-semibold">{{ draft.caseTitle }}</td>
          <td>{{ draft.filingType }}</td>
          <td>{{ draft.lastUpdated }}</td>
          <td class="text-end">
            <a [routerLink]="['/advocate/dashboard/efiling/draft-filings/edit', draft.id]">Edit</a>
          </td>
        </tr>
      }
      @empty {
        <tr>
          <td colspan="4" class="text-center text-muted py-4">
            No draft filings found
          </td>
        </tr>
      }
    </tbody>
</table>
