<form [formGroup]="form" class="form-wrapper">
  <!-- GROUP 1 -->
  <div class="form-group-block">
    <div class="section-title">Litigant</div>

    <div class="row g-3">
      <div class="col-md-6 d-flex align-items-center justify-content-start">
        <label class="form-label pe-3"> Is Organisation ? </label>

        <input type="checkbox" class="form-check mb-2" formControlName="isOrganisation" />
      </div>
      <div class="col-md-6" *ngIf="form.get('isOrganisation')?.value">
        <label class="form-label"> Organisation Type <small class="text-danger">*</small> </label>

        <select class="form-control form-select" formControlName="organisationType">
          <option value="">Select</option>
          <option>Government</option>
          <option>Private</option>
          <option>Company</option>
        </select>
      </div>
      <div class="col-md-6 d-flex align-items-center">
        <label class="form-label pe-3">Litigant Type ?</label>

        <div class="d-flex gap-4 mb-1">
          <div class="form-check">
            <input
              type="radio"
              class="form-check-input"
              value="petitioner"
              formControlName="litigantType"
            />
            <label class="form-check-label">Petitioner</label>
          </div>

          <div class="form-check">
            <input
              type="radio"
              class="form-check-input"
              value="respondent"
              formControlName="litigantType"
            />
            <label class="form-check-label">Respondent</label>
          </div>
        </div>
      </div>

      <div class="col-md-6">
        <label class="form-label">
          {{ form.get('litigantType')?.value === 'petitioner' ? 'Petitioner' : 'Respondent' }}
          <small class="text-danger">*</small>
        </label>

        <input class="form-control" placeholder="" formControlName="litigantName" />
      </div>
    </div>
  </div>

  <!-- GROUP 2 -->
  <div class="form-group-block">
    <div class="section-title">Contact Details</div>

    <div class="row g-3">
      <div class="col-md-6">
        <label class="form-label">Email</label>
        <input class="form-control" formControlName="email" />
      </div>

      <div class="col-md-6">
        <label class="form-label">Mobile No</label>
        <input class="form-control" formControlName="mobile" />
      </div>

      <div class="col-md-6">
        <label class="form-label">Occupation</label>
        <input class="form-control" formControlName="occupation" />
      </div>

      <div class="col-md-6">
        <label class="form-label">Pin Code</label>
        <input class="form-control" formControlName="pincode" />
      </div>

      <div class="col-md-6">
        <label class="form-label"> Address <small class="text-danger">*</small> </label>

        <textarea class="form-control" rows="2" formControlName="address"></textarea>
      </div>
    </div>
  </div>

  <!-- GROUP 3 -->
  <div class="form-group-block">
    <div class="section-title">State Information</div>

    <div class="row g-3">
      <div class="col-md-4">
        <label class="form-label">State</label>

        <select class="form-control form-select" formControlName="state">
          <option value="">Select State</option>
          <option>Sikkim</option>
        </select>
      </div>

      <div class="col-md-4">
        <label class="form-label">District</label>

        <select class="form-control form-select" formControlName="district">
          <option value="">Select District</option>
          <option>East Sikkim</option>
          <option>West Sikkim</option>
        </select>
      </div>

      <div class="col-md-4">
        <label class="form-label">Taluka</label>

        <select class="form-control form-select" formControlName="taluka">
          <option value="">Select Taluka</option>
        </select>
      </div>

      <div class="col-md-4">
        <label class="form-label">Hobli</label>

        <select class="form-control form-select" formControlName="hobli">
          <option value="">Select Hobli</option>
        </select>
      </div>
    </div>
  </div>

  <!-- GROUP 4 -->
  <!-- <div class="form-group-block">
    <div class="section-title">Other Information</div>

    <div class="row g-3">
      <div class="col-md-6">
        <div class="form-check mt-2">
          <input type="checkbox" class="form-check-input" formControlName="otherInformation" />
          <label class="form-check-label">Other Information</label>
        </div>
      </div>

      <div class="col-md-6">
        <div class="form-check mt-2">
          <input type="checkbox" class="form-check-input" formControlName="legalHeir" />
          <label class="form-check-label">Add Legal Heir</label>
        </div>
      </div>
    </div>
  </div> -->
</form>
