<form [formGroup]="form" (ngSubmit)="submit()" class="form-group-block">
  <div class="row g-3 align-items-end mb-3 mt-2">
    <div class="col-md-4 text-start" *ngIf="!defaultDocumentType">
      <label class="form-label text-start ps-lg-2"
        >Document Type <small class="text-danger">*</small></label
      >
      <input
        type="text"
        class="form-control top-control"
        formControlName="document_type"
        placeholder="Enter document type"
        (input)="onTopDocumentTypeInput($any($event.target).value)"
        [disabled]="isUploading"
        [class.is-invalid]="isDocumentTypeInvalid()"
      />
      <small class="text-danger" *ngIf="isDocumentTypeInvalid()"> document type is required </small>
    </div>
    <div class="col-md-4 text-start">
      <label class="form-label text-start ps-lg-2">Select PDF files</label>
      <div class="drop-zone top-control" (click)="!isUploading && pdfInput.click()">
        <input
          #pdfInput
          type="file"
          class="form-control d-none"
          accept="application/pdf"
          multiple
          (change)="onFileChange($event)"
        />
        <span class="drop-text">Choose PDF files to upload</span>
      </div>
      <small class="text-danger" *ngIf="isFilesInvalid()">at least one PDF is required</small>
    </div>
    <div class="col-md-4 d-flex gap-2 flex-wrap align-items-center" *ngIf="entries.length > 0">
      <button class="btn btn-dark" type="submit" [disabled]="!canUpload()">
        <span
          *ngIf="isUploading"
          class="spinner-border spinner-border-sm me-2"
          role="status"
          aria-hidden="true"
        ></span>
        {{ isUploading ? 'Uploading...' : 'Upload Documents' }}
      </button>
    </div>
  </div>

  <div class="alert alert-danger alert-dismissible py-2 small" *ngIf="mergeError">
    {{ mergeError }}
    <button type="button" class="btn-close btn-sm" (click)="mergeError = null" aria-label="Close"></button>
  </div>

  <div
    *ngIf="entries.length > 0"
    class="file-list"
    cdkDropList
    [cdkDropListData]="entries"
    [cdkDropListDisabled]="isUploading"
    (cdkDropListDropped)="reorderEntries($event)"
  >
    <div
      class="file-row"
      *ngFor="let entry of entries; let i = index; trackBy: trackByEntry"
      cdkDrag
    >
      <div class="file-header">
        <div class="file-header-left">
          <span
            class="drag-handle"
            cdkDragHandle
            title="Drag to reorder"
            [class.disabled]="isUploading"
          >
            <i class="fa-solid fa-grip-vertical"></i>
          </span>
          <span class="file-name" [title]="entry.file.name">{{ entry.file.name }}</span>
        </div>

        <button
          type="button"
          class="btn btn-sm btn-outline-danger"
          (click)="removeEntry(i)"
          [disabled]="isUploading"
        >
          Remove
        </button>
      </div>

      <div class="index-field">
        <label class="form-label text-start mb-1">Index Name:</label>
        <input
          type="text"
          class="form-control"
          [value]="entry.index_name"
          (input)="updateDocumentType(i, $any($event.target).value)"
          [attr.list]="
            entry.index_name && entry.index_name.trim() ? 'index-name-suggestions-' + i : null
          "
          placeholder="Eg. Synopsis/List of Dates and Events ...."
          [disabled]="isUploading"
          [class.is-invalid]="isIndexNameInvalid(entry)"
          required
        />

        <div class="text-danger small" *ngIf="isIndexNameInvalid(entry)">
          Index Name is required.
        </div>

        <datalist
          *ngIf="entry.index_name && entry.index_name.trim()"
          [id]="'index-name-suggestions-' + i"
        >
          <option
            *ngFor="let name of getIndexSuggestions(entry.index_name)"
            [value]="name"
          ></option>
        </datalist>
      </div>

      <div class="upload-progress-wrap" *ngIf="isUploading">
        <div class="upload-progress-label">
          <span>Upload progress</span>
          <span>{{ getFileProgress(i) }}%</span>
        </div>
        <div class="progress">
          <div
            class="progress-bar"
            role="progressbar"
            [style.width.%]="getFileProgress(i)"
            [attr.aria-valuenow]="getFileProgress(i)"
            aria-valuemin="0"
            aria-valuemax="100"
          ></div>
        </div>
      </div>
    </div>
  </div>
</form>
