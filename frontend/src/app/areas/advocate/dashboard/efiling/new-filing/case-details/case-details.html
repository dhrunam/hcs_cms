<form [formGroup]="form" class="form-wrapper">
  <!-- GROUP 1 -->
  <div class="form-group-block">
    <div class="section-title">Case Details</div>

    <div class="row g-3">
      <div class="col-md-6">
        <label class="form-label"> Cause of Action <small class="text-danger">*</small> </label>
        <textarea
          class="form-control"
          rows="2"
          formControlName="cause_of_action"
          [class.is-invalid]="isControlInvalid('cause_of_action')"
        ></textarea>
      </div>

      <div class="col-md-6">
        <label class="form-label">
          Date of Cause of Action <small class="text-danger">*</small>
        </label>
        <input
          type="date"
          class="form-control"
          formControlName="date_of_cause_of_action"
          [class.is-invalid]="isControlInvalid('date_of_cause_of_action')"
        />
      </div>
    </div>
  </div>

  <!-- GROUP 2 -->
  <div class="form-group-block">
    <div class="section-title">Dispute Arising Out Of</div>

    <div class="row g-3">
      <div class="col-md-6">
        <label class="form-label">State</label>
        <select
          class="form-control form-select"
          formControlName="dispute_state"
          (change)="get_districts($event)"
        >
          <option value="">Select State</option>
          <option *ngFor="let s of states" [value]="s.id">{{ s.state }}</option>
        </select>
      </div>

      <div class="col-md-6">
        <label class="form-label">District</label>
        <select class="form-control form-select" formControlName="dispute_district">
          <option value="">Select District</option>
          <option *ngFor="let d of districts" [value]="d.id">{{ d.district }}</option>
        </select>
      </div>

      <div class="col-md-6">
        <label class="form-label">Taluka</label>
        <input type="text" class="form-control" formControlName="dispute_taluka" />
      </div>
    </div>
  </div>

  <!-- VIEW MODE (disabled) -->
  <div class="form-group-block">
    <div class="section-title">Act Details</div>

    <div class="row g-3" *ngIf="isDisabled">
      <div class="col-md-6">
        <label class="form-label">Act <small class="text-danger">*</small></label>

        <select #actInput class="form-control form-select" name="act">
          <option value="">Select Act</option>
          <option *ngFor="let act of acts" [value]="act.actcode">
            {{ act.actname }}
          </option>
        </select>
      </div>

      <div class="col-md-6">
        <label class="form-label">Section <small class="text-danger">*</small></label>
        <input #sectionInput class="form-control" name="section" />
      </div>

      <div class="col-md-12">
        <button
          type="button"
          class="btn btn-success btn-sm"
          (click)="addAct(actInput, sectionInput)"
        >
          + Add Act
        </button>
      </div>
    </div>
    <div class="row g-3" *ngIf="!isDisabled">
      <div class="col-md-6">
        <label class="form-label">Act <small class="text-danger">*</small></label>

        <select
          class="form-control form-select"
          formControlName="act"
          [class.is-invalid]="isActControlInvalid('act')"
        >
          <option value="">Select Act</option>
          <option *ngFor="let act of acts" [value]="act.actcode">
            {{ act.actname }}
          </option>
        </select>
      </div>

      <div class="col-md-6">
        <label class="form-label">Section <small class="text-danger">*</small></label>
        <input
          class="form-control"
          formControlName="section"
          [class.is-invalid]="isActControlInvalid('section')"
        />
      </div>

      <div class="col-md-12">
        <button type="button" class="btn btn-success btn-sm" (click)="addAct()">+ Add Act</button>
      </div>
    </div>

    <div class="col-md-12 mt-3" *ngIf="actList.length > 0">
      <label class="text-muted small">Acts & Sections</label>

      <div>
        <div
          *ngFor="let act of actList; let i = index"
          class="d-flex align-items-center justify-content-between border rounded px-3 py-2 mb-2"
          style="background-color: #f8fafc"
        >
          <div>
            <div class="fw-normal">{{ i + 1 }}. {{ act.actname }}</div>
            <div class="text-muted small">Section: {{ act.section }}</div>
          </div>
          <button type="button" class="btn btn-sm btn-outline-danger" (click)="removeAct(i)">
            Delete
          </button>
        </div>
      </div>
    </div>
  </div>
</form>
