<div class="dashboard-header mb-3 d-flex justify-content-between align-items-center flex-wrap gap-2">
  <div>
    <h2 class="fw-semibold mb-0">Listed Cases</h2>
    <p class="text-muted small mb-0">Review cases that already have a bench assigned</p>
  </div>

  <div class="d-flex align-items-center gap-2">
    <button class="btn btn-success btn-sm" (click)="proceedToGenerator()" [disabled]="!canProceedToGenerator">
      Generate Cause List
    </button>
  </div>
</div>

<div *ngIf="isLoading" class="text-center py-4 text-muted">Loading listed cases...</div>

<div *ngIf="loadError" class="alert alert-warning" role="alert">
  {{ loadError }}
</div>

<ng-container *ngIf="!isLoading && !loadError">
  <div *ngIf="cases.length > 0" class="mt-3">
    <div class="case-grid">
      <div class="case-card" *ngFor="let c of cases">
        <div class="case-card-header case-click" role="button" (click)="openCase(c.efiling_id)">
          <div class="d-flex justify-content-between align-items-start gap-3 flex-wrap">
            <div>
              <div class="fw-semibold fs-6">{{ c.case_number || '-' }}</div>
              <div class="small text-muted">
                {{ c.petitioner_vs_respondent || (c.petitioner_name || '-') + ' vs ' + (c.respondent_name || '-') }}
              </div>
            </div>

            <div class="bench-picker">
              <label class="form-label small fw-semibold mb-1">Listed Bench</label>
              <div class="tiny text-muted mt-1">Assigned: {{ benchLabel(c.bench) }}</div>
            </div>
          </div>
        </div>

        <div class="case-card-body">
          <div class="case-summary">
          </div>
        </div>
      </div>
    </div>
  </div>

  <div *ngIf="cases.length === 0" class="text-muted text-center py-4">
    No listed cases found.
  </div>
</ng-container>
