<div class="dashboard-header mb-3 d-flex justify-content-between align-items-center flex-wrap gap-2">
  <div>
    <h2 class="fw-semibold mb-0">Cause List Generator</h2>
    <p class="text-muted mb-0">Select a date, review bench-wise drafts, then publish</p>
  </div>

  <div class="d-flex align-items-end gap-2">
    <a class="btn btn-sm btn-outline-secondary" routerLink="/listing-officers/dashboard/assign-cases">
      Back to Registered Cases
    </a>
    <div>
      <label class="form-label mb-1 fw-semibold">Cause List Date</label>
      <input
        type="date"
        class="form-control form-control-sm"
        [(ngModel)]="selectedDate"
        (change)="onDateChange()"
        [ngModelOptions]="{ standalone: true }"
      />
    </div>
  </div>
</div>

<div *ngIf="isLoading" class="text-center py-4 text-muted">Loading cause list drafts...</div>

<div *ngIf="publishError" class="alert alert-warning py-2">
  {{ publishError }}
</div>

<div class="accordion" id="benchAccordion" *ngIf="!isLoading">
  <div class="accordion-item bench-accordion-item" *ngFor="let state of benchStates; let i = index">
    <h2 class="accordion-header" [id]="'benchHeading' + i">
      <button
        class="accordion-button collapsed bench-accordion-button"
        type="button"
        data-bs-toggle="collapse"
        [attr.data-bs-target]="'#benchCollapse' + i"
        [attr.aria-controls]="'benchCollapse' + i"
      >
        <div class="d-flex justify-content-between align-items-center w-100 gap-2 flex-wrap">
          <div class="fw-semibold">
            {{ benchLabel(state.bench_key) }}
            <span class="text-muted small ms-2">({{ includedCount(state) }} cases)</span>
          </div>
          <div class="d-flex align-items-center gap-2 ms-auto">
            <span *ngIf="state.pdfUrl" class="badge rounded-pill text-bg-success">Published</span>
            <span *ngIf="!state.pdfUrl" class="badge rounded-pill text-bg-secondary">Not published</span>
          </div>
        </div>
      </button>
    </h2>
    <div
      [id]="'benchCollapse' + i"
      class="accordion-collapse collapse"
      [attr.aria-labelledby]="'benchHeading' + i"
      data-bs-parent="#benchAccordion"
    >
      <div class="accordion-body">
        <div class="d-flex justify-content-end gap-2 mb-3 flex-wrap">
          <button
            class="btn btn-sm btn-outline-primary"
            (click)="saveDraft(state)"
            [disabled]="state.isSaving || !selectedDate"
          >
            {{ state.isSaving ? 'Saving...' : 'Save Draft' }}
          </button>
          <a
            *ngIf="state.cause_list_id && (draftPdfUrl(state) as durl)"
            class="btn btn-sm btn-outline-primary"
            [href]="durl"
            target="_blank"
          >
            View Draft PDF
          </a>
          <a *ngIf="state.pdfUrl" class="btn btn-sm btn-outline-secondary" [href]="state.pdfUrl" target="_blank">
            View Published PDF
          </a>
          <button
            class="btn btn-sm btn-success"
            (click)="publish(state)"
            [disabled]="state.isPublishing || !selectedDate || includedCount(state) === 0"
          >
            {{ state.isPublishing ? 'Publishing...' : (state.pdfUrl ? 'Re-publish' : 'Publish') }}
          </button>
        </div>

        <div class="table-responsive bench-table-wrap">
          <table class="table table-sm align-middle mb-0">
            <thead>
              <tr>
                <th style="width: 95px;">Sr No</th>
                <th>Case Number</th>
                <th style="width: 110px;" class="text-center">Include</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let item of state.items">
                <td>
                  <input
                    type="number"
                    class="form-control form-control-sm"
                    [(ngModel)]="item.serial_no"
                    [disabled]="!item.included"
                    [ngModelOptions]="{ standalone: true }"
                  />
                </td>
                <td class="text-nowrap">{{ item.case_number || '-' }}</td>
                <td class="text-center">
                  <input
                    type="checkbox"
                    class="form-check-input"
                    [(ngModel)]="item.included"
                    [ngModelOptions]="{ standalone: true }"
                  />
                </td>
              </tr>

              <tr *ngIf="state.items.length === 0">
                <td colspan="3" class="text-muted text-center py-3">No accepted cases assigned to this bench.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
